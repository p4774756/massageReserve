name: Deploy Firebase

on:
  push:
    branches: [main]

# checkout / setup-node 等 Action 內建腳本改在 Node 24 上跑，避免 Node 20 淘汰警告
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install root deps
        run: npm ci

      - name: Build web
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Install & build functions
        run: |
          npm ci --prefix functions
          npm run build --prefix functions

      # defineString("RESEND_FROM") 在非互動 deploy 時須有 dotenv，否則 firebase-tools 會中止
      # （與程式內 default 無關）。可選 GitHub secret RESEND_FROM；未設則與程式預設相同。
      - name: Write Functions dotenv (RESEND_FROM)
        run: |
          set -euo pipefail
          PROJECT_ID="${VITE_FIREBASE_PROJECT_ID:?VITE_FIREBASE_PROJECT_ID is required}"
          DEFAULT_FROM='Massage預約 <onboarding@resend.dev>'
          FROM="${RESEND_FROM:-$DEFAULT_FROM}"
          printf '%s\n' "RESEND_FROM=$FROM" > "functions/.env.${PROJECT_ID}"
        env:
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}

      - name: Deploy to Firebase
        run: npx -y firebase-tools@latest deploy --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

name: Deploy Firebase

on:
  push:
    branches: [main]

# checkout / setup-node 等 Action 內建腳本改在 Node 24 上跑，避免 Node 20 淘汰警告
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install root deps
        run: npm ci

      - name: Build web
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Install & build functions
        run: |
          npm ci --prefix functions
          npm run build --prefix functions

      # defineString(...) 參數在非互動 deploy 時仍需 dotenv 提供值，否則 firebase-tools 會中止
      # （與程式內 default 無關）。可選 GitHub secrets：RESEND_FROM、EMAIL_PUBLIC_ORIGIN。
      - name: Write Functions dotenv (RESEND_FROM / EMAIL_PUBLIC_ORIGIN)
        run: |
          set -euo pipefail
          PROJECT_ID="${VITE_FIREBASE_PROJECT_ID:?VITE_FIREBASE_PROJECT_ID is required}"
          DEFAULT_FROM='Massage預約 <onboarding@resend.dev>'
          DEFAULT_EMAIL_ORIGIN="https://${PROJECT_ID}.web.app"
          FROM="${RESEND_FROM:-$DEFAULT_FROM}"
          EMAIL_ORIGIN="${EMAIL_PUBLIC_ORIGIN:-$DEFAULT_EMAIL_ORIGIN}"
          {
            printf '%s\n' "RESEND_FROM=$FROM"
            printf '%s\n' "EMAIL_PUBLIC_ORIGIN=$EMAIL_ORIGIN"
          } > "functions/.env.${PROJECT_ID}"
        env:
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          EMAIL_PUBLIC_ORIGIN: ${{ secrets.EMAIL_PUBLIC_ORIGIN }}

      # 遠端若仍有已從程式碼移除的函式，先嘗試刪除（失敗略過）。
      # deploy 另加 --force：non-interactive 時允許刪除本地已不存在的 Cloud Functions。
      - name: Remove orphaned legacy Cloud Functions (asia-east1)
        run: |
          LEGACY=(
            exchangeSessionForArcadePoints
            getLittleMaryAdminStats
            littleMaryHiLoAccount
            littleMaryHiLoRoll
            littleMarySpin
            littleMarySpinAccount
            redeemArcadePointsForSession
            syncSessionPriceFromTsmcDaily
            syncSessionPriceFromTsmcAdmin
            yahooChartProxy
          )
          for fn in "${LEGACY[@]}"; do
            npx -y firebase-tools@latest functions:delete "$fn" --region asia-east1 --force || true
          done
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy Hosting & Functions
        run: npx -y firebase-tools@latest deploy --only hosting,functions --non-interactive --force
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      # Firestore API 偶發 503；與 hosting/functions 分開，避免整包 deploy 因索引上傳失敗而全滅
      - name: Deploy Firestore rules & indexes (retry)
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            if npx -y firebase-tools@latest deploy --only firestore --non-interactive --force; then
              echo "Firestore deploy succeeded on attempt ${attempt}"
              exit 0
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "Firestore deploy failed after ${attempt} attempts"
              exit 1
            fi
            wait_s=$((attempt * 25))
            echo "Firestore deploy attempt ${attempt} failed (often transient 503); retry in ${wait_s}s..."
            sleep "$wait_s"
          done
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
